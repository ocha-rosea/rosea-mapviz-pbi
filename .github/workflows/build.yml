# GitHub Actions workflow for automated Power BI visual builds
name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      semantic_changed: ${{ steps.semantic_diff.outputs.semantic_changed }}
      version: ${{ steps.read_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Read current version
      id: read_version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"

    - name: Detect semantic version change
      id: semantic_diff
      run: |
        CURR=${{ steps.read_version.outputs.version }}
        CURR_SEM=${CURR%.*}
        if git show HEAD^:package.json >/dev/null 2>&1; then
          PREV=$(git show HEAD^:package.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).version));")
          PREV_SEM=${PREV%.*}
        else
          PREV_SEM=""
        fi
        if [ "$PREV_SEM" != "$CURR_SEM" ]; then
          echo "semantic_changed=true" >> $GITHUB_OUTPUT
          echo "Semantic change: $PREV_SEM -> $CURR_SEM"
        else
          echo "semantic_changed=false" >> $GITHUB_OUTPUT
          echo "No semantic change (semantic remains $CURR_SEM)"
        fi

    - name: Run tests
      run: npm test

    - name: Auto build version bump (4th part)
      if: |
        steps.semantic_diff.outputs.semantic_changed == 'false' && 
        github.event_name == 'push' && 
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
        !startsWith(github.ref, 'refs/tags/')
      env:
        AUTO_COMMIT: 1
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        npm run version:auto

    - name: Package visual
      run: npx pbiviz package

    - name: Upload visual package (always)
      uses: actions/upload-artifact@v4
      with:
        name: powerbi-visual-${{ github.run_number }}
        path: dist/*.pbiviz
        retention-days: 14

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.semantic_changed == 'true' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Ensure sync (idempotent)
      run: npm run sync-version

    - name: Package for release
      run: npx pbiviz package

    - name: Get version
      id: get_version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        SEMVER=${VERSION%.*}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "semver=$SEMVER" >> $GITHUB_OUTPUT
        echo "Version: $VERSION (semantic $SEMVER)"

    - name: Get .pbiviz filename
      id: get_filename
      run: |
        PBIVIZ_FILE=$(ls dist/*.pbiviz | head -1)
        FILENAME=$(basename "$PBIVIZ_FILE")
        echo "filename=$FILENAME" >> $GITHUB_OUTPUT
        echo "filepath=$PBIVIZ_FILE" >> $GITHUB_OUTPUT

    - name: Generate changelog from commits
      id: generate_changelog
      run: |
        # Find the previous semantic version tag (v*.*.*)
        # Note: This step runs before "Tag semantic version", so the current version tag may not exist yet
        # However, if the workflow is retried, the tag might exist, so we exclude it
        CURRENT_TAG="v${{ steps.get_version.outputs.semver }}"
        PREV_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | grep -F -v "${CURRENT_TAG}" | head -1 || true)
        
        if [ -z "$PREV_TAG" ]; then
          echo "No previous semantic version tag found, using recent commits"
          # Limit to 50 commits to avoid performance issues with large repositories
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges --max-count=50)
        else
          echo "Generating changelog from $PREV_TAG to HEAD"
          COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        
        # Save to output using heredoc delimiter for multi-line content
        {
          echo 'changelog<<EOF'
          echo "$COMMITS"
          echo EOF
        } >> $GITHUB_OUTPUT

    - name: Tag semantic version
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if git rev-parse v${{ steps.get_version.outputs.semver }} >/dev/null 2>&1; then
          echo "Tag v${{ steps.get_version.outputs.semver }} already exists"
        else
          git tag v${{ steps.get_version.outputs.semver }}
          git push --tags
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.semver }}
        name: rosea-mapviz-pbi v${{ steps.get_version.outputs.version }}
        body: |
          🎨 **Rosea MapViz Power BI Visual Release**

          **Version:** ${{ steps.get_version.outputs.version }} (semantic v${{ steps.get_version.outputs.semver }})
          **Build:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}

          ### 📦 Package Details
          - **Visual Name:** Rosea MapViz Power BI Visual
          - **File:** ${{ steps.get_filename.outputs.filename }}
          - **Type:** Power BI Custom Visual (.pbiviz)

          ### 🚀 Installation
          1. Download the `.pbiviz` file below
          2. Import into Power BI Desktop
          3. Add to your reports and dashboards

          ### 📋 What's New
          ${{ steps.generate_changelog.outputs.changelog }}
        files: |
          ${{ steps.get_filename.outputs.filepath }}
        draft: false
        prerelease: false
